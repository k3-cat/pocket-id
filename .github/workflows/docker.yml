# $schema: https://json.schemastore.org/github-workflow.json

name: "_ Build Docker Image _"

on:
  workflow_call:
    inputs:
      version-tag:
        type: string
        required: true

env:
  DOCKER_IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set short git commit SHA
        id: commit-id
        run: echo "val=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Download builds
        uses: actions/download-artifact@v8
        with:
          name: backend-build-${{ steps.commit-id.outputs.val }}
          path: backend/build/

      - name: Build and push container image
        id: docker-build
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: amd64,arm64
          tags: ${{ env.DOCKER_IMAGE_NAME }}:${{ inputs.version-tag }}
          file: Dockerfile.distroless
          outputs: type=image,oci-mediatypes=true,compression=zstd,compression-level=3,force-compression=true,zstd-chunked=true

      - name: Image digest
        run: echo ${{ steps.docker-build.outputs.digest }}
